<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Background -->
  <rect width="120" height="120" fill="#0D0D0D"/>
  <!-- Thin gold inner frame -->
  <rect x="7" y="7" width="106" height="106" fill="none" stroke="#C9A84C" stroke-width="0.6" opacity="0.45"/>
  <!-- Monogram BS -->
  <text
    x="60"
    y="74"
    font-family="'Didot', 'Cormorant Garamond', 'EB Garamond', 'Bodoni MT', Georgia, 'Times New Roman', serif"
